<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Monitoring — HITHC</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body data-nav-id="demos">
  <div id="site-header"></div>

  <main>
    <h1>Weather Monitoring</h1>
    <p>
      Live conditions from the Ground Truth Network's 3 Ecowitt weather
      stations, plus a 7-day NWS forecast for the property.
    </p>
    <div id="stale-banner" class="stale-banner"></div>
    <p class="updated-line" id="nodes-updated">Loading…</p>

    <div class="node-map" id="node-map"></div>

    <div class="station-grid" id="station-grid"></div>

    <h2>7-day forecast</h2>
    <p class="updated-line" id="forecast-updated">Loading…</p>
    <div class="forecast-strip" id="forecast-strip"></div>

    <p><a href="/demos/">&larr; Back to Demo Applications</a></p>
  </main>

  <div id="site-footer"></div>
  <script src="/assets/nav.js" defer></script>
  <script src="/assets/live-data.js" defer></script>
  <script src="/assets/weather-monitoring.js" defer></script>
</body>
</html>
